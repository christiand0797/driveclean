<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveClean</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #0f0f1a; color: #eee; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    h1 { text-align: center; color: #00d4ff; font-size: 1.8rem; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 15px; font-size: 0.85rem; }
    
    .login-section { text-align: center; padding: 80px 20px; }
    .btn { background: #00d4ff; color: #0f0f1a; border: none; padding: 14px 35px; font-size: 1rem; font-weight: bold; border-radius: 25px; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,212,255,0.4); }
    .btn-danger { background: #ff4757; color: #fff; }
    .btn-warning { background: #ffa502; color: #0f0f1a; }
    .btn-small { padding: 8px 16px; font-size: 0.8rem; border-radius: 15px; }
    .dashboard { display: none; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-info img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #00d4ff; }
    
    .storage-bar { background: #1a1a2e; height: 20px; border-radius: 10px; margin: 15px 0; overflow: hidden; position: relative; }
    .storage-used { background: linear-gradient(90deg, #00d4ff, #0099ff); height: 100%; transition: width 0.5s; }
    .storage-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.7rem; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .stat-card { background: #1a1a2e; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card h3 { color: #00d4ff; font-size: 1.3rem; margin-bottom: 3px; }
    .stat-card p { color: #777; font-size: 0.75rem; }
    .stat-card .warning { color: #ff4757; }
    
    .tabs { display: flex; gap: 5px; margin-bottom: 12px; border-bottom: 1px solid #252545; padding-bottom: 8px; overflow-x: auto; }
    .tab { background: transparent; color: #777; border: none; padding: 10px 16px; font-size: 0.85rem; cursor: pointer; border-radius: 8px; white-space: nowrap; }
    .tab:hover { color: #00d4ff; }
    .tab.active { background: #00d4ff; color: #0f0f1a; font-weight: 600; }
    
    .section { display: none; }
    .section.active { display: block; }
    
    .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .file-card { background: #1a1a2e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
    .file-card:hover { transform: translateY(-2px); }
    .thumbnail { width: 100%; height: 100px; background: #252545; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .thumbnail .icon { font-size: 2rem; }
    .file-info { padding: 8px; }
    .file-name { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { color: #666; font-size: 0.65rem; margin-top: 3px; }
    
    .actions-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .count-display { color: #888; font-size: 0.85rem; margin-left: auto; }
    
    .empty { text-align: center; padding: 40px; color: #555; }
    
    .toast { position: fixed; bottom: 20px; right: 20px; background: #2ed573; color: #0f0f1a; padding: 12px 24px; border-radius: 8px; font-weight: 600; transform: translateY(100px); transition: transform 0.3s; }
    .toast.show { transform: translateY(0); }
    .toast.error { background: #ff4757; color: #fff; }
    .toast.loading { background: #ffa502; }
  </style>
</head>
<body>
  <div class="container">
    <h1>DriveClean</h1>
    <p class="subtitle">Clean your Google Drive automatically</p>
    
    <div class="login-section" id="loginSection">
      <p style="color:#888;margin-bottom:20px;">Connect your Google account</p>
      <button class="btn" onclick="login()">Connect Google Account</button>
    </div>
    
    <div class="dashboard" id="dashboard">
      <div class="header">
        <div class="user-info" id="userInfo"></div>
        <button class="btn btn-small btn-danger" onclick="logout()">Logout</button>
      </div>
      
      <div class="storage-bar">
        <div class="storage-used" id="storageUsed" style="width:0%"></div>
        <div class="storage-text" id="storageText">Loading...</div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card" onclick="showTab('files')"><h3 id="totalFiles">0</h3><p>Total Files</p></div>
        <div class="stat-card" onclick="showTab('duplicates')"><h3 class="warning" id="duplicateCount">0</h3><p>Duplicates</p></div>
        <div class="stat-card" onclick="showTab('large')"><h3 id="largeCount">0</h3><p>Large (100MB+)</p></div>
        <div class="stat-card" onclick="showTab('old')"><h3 id="oldCount">0</h3><p>Old (1 yr+)</p></div>
        <div class="stat-card" onclick="showTab('images')"><h3 id="imageCount">0</h3><p>Images</p></div>
        <div class="stat-card" onclick="showTab('videos')"><h3 id="videoCount">0</h3><p>Videos</p></div>
        <div class="stat-card" onclick="showTab('emails')"><h3 id="emailCount">0</h3><p>Emails</p></div>
      </div>
      
      <div class="tabs">
        <button class="tab active" onclick="showTab('files')">All Files</button>
        <button class="tab" onclick="showTab('duplicates')">Duplicates</button>
        <button class="tab" onclick="showTab('large')">Large</button>
        <button class="tab" onclick="showTab('old')">Old</button>
        <button class="tab" onclick="showTab('images')">Images</button>
        <button class="tab" onclick="showTab('videos')">Videos</button>
        <button class="tab" onclick="showTab('emails')">Emails</button>
      </div>
      
      <div class="actions-bar">
        <button class="btn btn-small btn-danger" onclick="deleteSelected()">Delete Selected</button>
        <button class="btn btn-small" onclick="scan()">Refresh</button>
        <span class="count-display" id="selectedCount">0 selected</span>
      </div>
      
      <div class="section active" id="files"><div class="file-grid" id="fileGrid"></div></div>
      <div class="section" id="duplicates"><div class="file-grid" id="duplicateGrid"></div></div>
      <div class="section" id="large"><div class="file-grid" id="largeGrid"></div></div>
      <div class="section" id="old"><div class="file-grid" id="oldGrid"></div></div>
      <div class="section" id="images"><div class="file-grid" id="imageGrid"></div></div>
      <div class="section" id="videos"><div class="file-grid" id="videoGrid"></div></div>
      <div class="section" id="emails"><div class="file-grid" id="emailGrid"></div></div>
    </div>
    
    <div class="toast" id="toast"></div>
  </div>
  
  <script>
    let scanData = {};
    let selectedFiles = new Set();
    let currentTab = 'files';
    
    function getIcon(mimeType) {
      if (mimeType?.includes('image')) return '🖼️';
      if (mimeType?.includes('video')) return '🎬';
      if (mimeType?.includes('audio')) return '🎵';
      if (mimeType?.includes('document') || mimeType?.includes('sheet')) return '📄';
      if (mimeType?.includes('folder')) return '📁';
      if (mimeType?.includes('zip') || mimeType?.includes('rar')) return '📦';
      return '📎';
    }
    
    async function login() {
      const res = await fetch('/api/auth/url');
      const { url } = await res.json();
      window.location.href = url;
    }
    
    async function checkUser() {
      const res = await fetch('/api/user');
      const data = await res.json();
      if (data.loggedIn) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userInfo').innerHTML = data.user.picture ? `<img src="${data.user.picture}">` : '';
        document.getElementById('userInfo').innerHTML += `<span style="color:#888;font-size:0.85rem">${data.user.email}</span>`;
        loadStorage();
        scan();
      }
    }
    
    async function loadStorage() {
      try {
        const res = await fetch('/api/storage');
        const data = await res.json();
        if (data.usage) {
          const pct = ((data.usageInDrive || 0) / data.usage) * 100;
          document.getElementById('storageUsed').style.width = pct + '%';
          document.getElementById('storageText').textContent = f(data.usageInDrive) + ' / ' + f(data.usage) + ' used';
        }
      } catch (e) {}
    }
    
    async function scan() {
      showToast('Scanning...', 'loading');
      const res = await fetch('/api/scan', { method: 'POST' });
      const data = await res.json();
      scanData = data;
      updateStats();
      renderAll();
      hideToast();
    }
    
    function updateStats() {
      document.getElementById('totalFiles').textContent = scanData.total || 0;
      document.getElementById('duplicateCount').textContent = (scanData.duplicates || []).length;
      document.getElementById('largeCount').textContent = (scanData.large || []).length;
      document.getElementById('oldCount').textContent = (scanData.old || []).length;
      document.getElementById('imageCount').textContent = (scanData.images || []).length;
      document.getElementById('videoCount').textContent = (scanData.videos || []).length;
      document.getElementById('emailCount').textContent = scanData.emails || 0;
    }
    
    function renderAll() {
      renderGrid('fileGrid', scanData.files || []);
      renderGrid('duplicateGrid', scanData.duplicates || []);
      renderGrid('largeGrid', scanData.large || []);
      renderGrid('oldGrid', scanData.old || []);
      renderGrid('imageGrid', scanData.images || []);
      renderGrid('videoGrid', scanData.videos || []);
    }
    
    function renderGrid(id, files) {
      const container = document.getElementById(id);
      if (!files?.length) {
        container.innerHTML = '<div class="empty">No files</div>';
        return;
      }
      container.innerHTML = files.slice(0, 50).map(f => {
        const thumb = f.thumbnailLink ? `<img src="${f.thumbnailLink}=w300-h300" onerror="this.style.display='none';this.parentElement.innerHTML='${getIcon(f.mimeType)}'">` : getIcon(f.mimeType);
        const sel = selectedFiles.has(f.id) ? 'style="border:2px solid #00d4ff"' : '';
        return `<div class="file-card" onclick="toggle('${f.id}')" ${sel}><div class="thumbnail">${thumb}</div><div class="file-info"><div class="file-name">${f.name}</div><div class="file-meta">${f(f.size)}</div></div></div>`;
      }).join('');
    }
    
    function toggle(id) {
      if (selectedFiles.has(id)) selectedFiles.delete(id);
      else selectedFiles.add(id);
      document.getElementById('selectedCount').textContent = selectedFiles.size + ' selected';
    }
    
    async function deleteSelected() {
      if (selectedFiles.size === 0) return showToast('No files selected', 'error');
      if (!confirm('Delete ' + selectedFiles.size + ' files?')) return;
      const fileIds = Array.from(selectedFiles);
      await fetch('/api/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ fileIds }) });
      selectedFiles.clear();
      showToast(fileIds.length + ' files deleted');
      scan();
    }
    
    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab')[['files','duplicates','large','old','images','videos','emails'].indexOf(tab)].classList.add('active');
      document.getElementById(tab).classList.add('active');
    }
    
    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }
    
    function f(bytes) {
      if (!bytes) return '0 B';
      const u = ['B','KB','MB','GB','TB'];
      let i = 0;
      while (bytes >= 1024 && i < u.length-1) { bytes /= 1024; i++; }
      return bytes.toFixed(1) + ' ' + u[i];
    }
    
    async function logout() {
      await fetch('/api/logout');
      window.location.reload();
    }
    
    checkUser();
  </script>
</body>
</html>
